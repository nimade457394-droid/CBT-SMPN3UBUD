<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT SMP Negeri 3 Ubud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; user-select: none; -webkit-user-select: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .header-blue { background-color: #1e3a8a; }
        .question-nav { cursor: pointer; border: 2px solid #e2e8f0; min-width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: 800; transition: 0.3s; background: white; }
        .question-nav.active { background-color: #1e3a8a; color: white; border-color: #1e3a8a; transform: scale(1.1); }
        .question-nav.done { background-color: #10b981; color: white; border-color: #10b981; }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="header-blue p-4 text-white flex items-center shadow-xl sticky top-0 z-50">
  <img src="https://i.ibb.co.com/SY0R8c8/images.jpg" alt="images" border="0">" class="h-10 mr-4 bg-white p-1 rounded shadow-sm">
  <div>
    <h1 class="text-xl font-black uppercase leading-none">CBT SMPN 3 UBUD</h1>
    <p class="text-[10px] tracking-[0.2em] opacity-80 uppercase font-bold">Integritas & Kejujuran</p>
  </div>
</div>

<div id="app" class="container mx-auto p-4 max-w-6xl">
  
<div id="loginPage" class="max-w-md mx-auto bg-white p-10 rounded-3xl shadow-2xl mt-10 border border-gray-100 fade-in">
  <div class="text-center mb-8">
    
    <div class="flex justify-center mb-6">
      <img src="https://i.ibb.co.com/SY0R8c8/images.jpg" alt="images" border="0">" class="h-24 w-24 object-contain">
    </div>
    <h2 class="text-3xl font-black text-gray-800">Login Sistem</h2>
    <p class="text-gray-400 font-medium">Gunakan akun yang telah terdaftar</p>
  </div>

  <div class="space-y-5">
    <select id="kelas" class="w-full border-2 p-4 rounded-2xl bg-gray-50 focus:ring-4 focus:ring-blue-100 outline-none transition">
      <option value="">-- Pilih Kelas --</option>
      <option>7A</option><option>7B</option><option>7C</option><option>7D</option><option>7E</option><option>7F</option><option>8A</option><option>8B</option><option>8C</option><option>8D</option><option>8E</option><option>8F</option><option>8G</option><option>9A</option><option>9B</option><option>9C</option><option>9D</option><option>9E</option><option>9F</option><option>9G</option><option>9H</option>
    </select>
    
    <div class="relative">
      <i class="fas fa-user absolute left-4 top-4 text-gray-400"></i>
      <input type="text" id="username" placeholder="Username" class="w-full border-2 p-4 pl-12 rounded-2xl bg-gray-50 outline-none focus:ring-4 focus:ring-blue-100">
    </div>
    
    <div class="relative">
      <i class="fas fa-lock absolute left-4 top-4 text-gray-400"></i>
      <input type="password" id="password" placeholder="Password" class="w-full border-2 p-4 pl-12 rounded-2xl bg-gray-50 outline-none focus:ring-4 focus:ring-blue-100">
    </div>

    <div class="flex gap-4 pt-4">
      <button onclick="handleLogin('siswa')" class="w-1/2 bg-blue-700 hover:bg-blue-800 text-white p-5 rounded-2xl font-black transition-all shadow-lg active:scale-95 uppercase">SISWA</button>
      <button onclick="handleLogin('guru')" class="w-1/2 bg-emerald-600 hover:bg-emerald-700 text-white p-5 rounded-2xl font-black transition-all shadow-lg active:scale-95 uppercase">GURU</button>
    </div>
  </div>
</div>
  <div id="subjectPage" class="hidden text-center mt-10 fade-in">
    <div class="bg-white p-12 rounded-3xl shadow-2xl max-w-lg mx-auto border border-gray-50">
      <h2 id="welcomeUser" class="text-2xl font-black mb-2 text-gray-800"></h2>
      <p class="text-gray-500 mb-8">Siap memulai ujian hari ini?</p>
      <select id="mapel" class="w-full border-2 p-4 rounded-2xl mt-2 text-lg font-bold text-gray-700 bg-gray-50">
          <option>Matematika</option><option>Bahasa Indonesia</option><option>PPKN</option><option>Seni Budaya</option><option>PJOK</option><option>Prakarya</option><option>Bahasa Bali</option><option>Informatika</option><option>Bahasa Inggris</option>
          <option>IPA</option><option>IPS</option><option>Agama</option>
      </select>
      <button onclick="startExamSequence()" class="mt-8 bg-blue-700 text-white w-full py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-blue-800 transition">MULAI SEKARANG</button>
    </div>
  </div>

  <div id="examPage" class="hidden grid grid-cols-12 gap-6 mt-4 fade-in">
    <div class="col-span-12 lg:col-span-9 bg-white p-8 rounded-3xl shadow-2xl border border-gray-100">
      <div class="flex justify-between border-b pb-5 mb-8 items-center">
        <span class="font-black text-gray-700 text-lg" id="infoNomor"></span>
        <div class="bg-red-50 text-red-600 px-6 py-2 rounded-2xl border-2 border-red-100 shadow-sm font-black text-xl" id="timer">00:00</div>
      </div>
      <div id="soalContainer"></div>
      <div class="flex justify-between mt-12 pt-8 border-t-2 border-gray-50">
        <button id="prevBtn" onclick="changeSoal(-1)" class="bg-gray-100 text-gray-600 px-10 py-4 rounded-2xl font-black hover:bg-gray-200">SEBELUMNYA</button>
        <button id="nextBtn" onclick="changeSoal(1)" class="bg-blue-700 text-white px-10 py-4 rounded-2xl font-black hover:bg-blue-800">BERIKUTNYA</button>
        <button id="finishBtn" onclick="handleStepTransition()" class="hidden bg-emerald-600 text-white px-10 py-4 rounded-2xl font-black hover:bg-emerald-700"></button>
      </div>
    </div>
    <div class="col-span-12 lg:col-span-3 bg-white p-6 rounded-3xl shadow-2xl border border-gray-100 h-fit sticky top-24">
      <h3 class="font-black mb-6 text-center text-gray-400 uppercase tracking-widest text-xs">Peta Soal</h3>
      <div id="navGrid" class="flex flex-wrap gap-3 justify-center"></div>
    </div>
  </div>

  <div id="teacherDashboard" class="hidden mt-6 fade-in">
    <div class="bg-white p-8 rounded-3xl shadow-2xl border-t-[12px] border-emerald-600">
      <h2 class="text-3xl font-black text-gray-800 mb-10">Review Hasil Ujian</h2>
      <select id="selKls" onchange="loadRekap(this.value)" class="border-2 p-3 rounded-xl w-64 bg-white font-bold mb-6">
          <option value="">-- Pilih Kelas --</option>
          <option>7A</option><option>7B</option><option>7C</option><option>7D</option><option>7E</option><option>7F</option><option>8A</option><option>8B</option><option>8C</option><option>8D</option><option>8E</option><option>8F</option><option>8G</option><option>9A</option><option>9B</option><option>9C</option><option>9D</option><option>9E</option><option>9F</option><option>9G</option><option>9H</option>
      </select>
      <div class="grid grid-cols-12 gap-8">
        <div id="absensiDiv" class="col-span-12 md:col-span-4 space-y-3"></div>
        <div id="detailDiv" class="col-span-12 md:col-span-8 bg-gray-50 rounded-3xl p-10">Pilih Siswa</div>
      </div>
    </div>
  </div>

</div>

<script>
  // GANTI INI DENGAN URL WEB APP ANDA
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwZbaVOTsMXLgq_y0qG8O9LdlensT-e68axkX9DckmawiGUzJZVcs2bH4DDrgcO-PQmow/exec";

  let userData = {}, questions = [], pgKunci = [], currentIdx = 0, answers = {}, timeLeft = 0, timerInterval, currentMode = 'PG', examConfig = {}, localRekap = [], cheatCount = 0;

  async function callGAS(action, data = {}) {
    const res = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ action, ...data })
    });
    return await res.json();
  }

  function kioskMode() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && timeLeft > 0) {
      cheatCount++;
      if (cheatCount >= 3) { alert("SISTEM: Anda melanggar batas (3x pindah tab)."); finalSubmit(); }
      else { alert("PERINGATAN: Jangan keluar layar! Pelanggaran: " + cheatCount + "/3"); }
    }
  });

  async function handleLogin(role) {
    const kls = document.getElementById('kelas').value, user = document.getElementById('username').value, pass = document.getElementById('password').value;
    const res = await callGAS('loginUser', { kelas: kls, username: user, password: pass, role: role });
    if (res.success) {
      userData = { ...res, kelas: kls };
      document.getElementById('loginPage').classList.add('hidden');
      if (role === 'siswa') {
        document.getElementById('subjectPage').classList.remove('hidden');
        document.getElementById('welcomeUser').innerText = "Halo, " + res.nama;
      } else { document.getElementById('teacherDashboard').classList.remove('hidden'); }
    } else alert(res.msg);
  }

  async function startExamSequence() {
    const mapel = document.getElementById('mapel').value, tk = userData.kelas.substring(0, 1);
    const mapel90 = ['Matematika', 'Bahasa Indonesia', 'Bahasa Inggris', 'IPA'];
    timeLeft = mapel90.includes(mapel) ? 90 * 60 : 60 * 60;
    kioskMode();
    const config = await callGAS('getExamConfig', { mapel, tingkat: tk });
    if (!config) return alert("Soal tidak ditemukan!");
    examConfig = config; 
    loadQuestions('PG', config.pgUrl);
  }

  async function loadQuestions(mode, url) {
    currentMode = mode;
    const resSoal = await callGAS('fetchQuestions', { url, type: mode });
    if (resSoal.length === 0) {
      if (mode === 'PG') return alert("Gagal ambil soal PG!");
      return finalSubmit();
    }
    questions = resSoal;
    if (mode === 'PG') { pgKunci = resSoal.map(q => q.kunci); startTimer(); }
    currentIdx = 0; renderNav(); showSoal(0);
    document.getElementById('subjectPage').classList.add('hidden');
    document.getElementById('examPage').classList.remove('hidden');
  }

  function showSoal(idx) {
    currentIdx = idx; const q = questions[idx];
    document.getElementById('infoNomor').innerText = "Nomor " + (idx + 1);
    let h = q.img ? `<img src="${q.img}" class="max-w-full h-48 mx-auto mb-6 rounded shadow">` : '';
    h += `<div class="text-2xl mb-8 font-bold">${q.soal}</div>`;
    if (currentMode === 'PG') {
      ['a','b','c','d'].forEach(o => {
        const val = o.toUpperCase(), ch = answers["PG_"+idx] === val ? 'checked' : '';
        h += `<label class="block p-4 border rounded-xl mb-3 cursor-pointer hover:bg-blue-50">
          <input type="radio" name="opt" value="${val}" ${ch} onclick="saveAns('${val}')"> ${val}. ${q[o]}
        </label>`;
      });
    } else {
      const val = answers["ESAI_"+idx] || "";
      h += `<textarea oninput="saveAns(this.value)" class="w-full border p-4 rounded-xl h-48" placeholder="Jawaban esai...">${val}</textarea>`;
    }
    document.getElementById('soalContainer').innerHTML = h;
    document.getElementById('prevBtn').classList.toggle('hidden', idx === 0);
    const isLast = idx === questions.length - 1;
    document.getElementById('nextBtn').classList.toggle('hidden', isLast);
    const fBtn = document.getElementById('finishBtn'); fBtn.classList.toggle('hidden', !isLast);
    fBtn.innerText = currentMode === 'PG' ? "LANJUT KE ESAI" : "SELESAI";
    updateNavUI();
  }

  function saveAns(v) { answers[currentMode + "_" + currentIdx] = v; updateNavUI(); }

  function handleStepTransition() {
    if (currentMode === 'PG') { if(confirm("Lanjut ke Esai?")) loadQuestions('ESAI', examConfig.esaiUrl); }
    else if (confirm("Kumpulkan jawaban?")) finalSubmit();
  }

  function renderNav() {
    let h = ''; questions.forEach((_, i) => h += `<div id="nav-${i}" onclick="showSoal(${i})" class="question-nav shadow-sm">${i + 1}</div>`);
    document.getElementById('navGrid').innerHTML = h;
  }

  function updateNavUI() {
    document.querySelectorAll('.question-nav').forEach((el, i) => {
      el.classList.remove('active', 'done');
      if (i === currentIdx) el.classList.add('active');
      if (answers[currentMode + "_" + i]) el.classList.add('done');
    });
  }

  function changeSoal(s) { showSoal(currentIdx + s); }

  function startTimer() {
    timerInterval = setInterval(() => {
      let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
      document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
      if (timeLeft <= 0) { clearInterval(timerInterval); finalSubmit(); }
      timeLeft--;
    }, 1000);
  }

  async function finalSubmit() {
    await callGAS('processFinalSubmit', { kelas: userData.kelas, row: userData.row, answers, pgKunci });
    alert("Jawaban Terkirim!"); location.reload();
  }

  async function loadRekap(kls) {
    if(!kls) return;
    const data = await callGAS('getRekapNilai', { kelas: kls });
    localRekap = data;
    let h = '';
    data.forEach((s, i) => h += `<div onclick="viewDetail(${i})" class="p-3 bg-white border rounded-xl cursor-pointer hover:border-emerald-500 font-bold">${s.absen}. ${s.nama}</div>`);
    document.getElementById('absensiDiv').innerHTML = h;
  }

  function viewDetail(i) {
    const s = localRekap[i];
    document.getElementById('detailDiv').innerHTML = `
      <h4 class="text-2xl font-black">${s.nama}</h4>
      <div class="grid grid-cols-2 gap-4 mt-4">
        <div class="bg-emerald-100 p-4 rounded-xl text-center">Benar: ${s.benar}</div>
        <div class="bg-red-100 p-4 rounded-xl text-center">Salah: ${s.salah}</div>
      </div>
      <div class="mt-6 font-bold whitespace-pre-wrap">${s.esai || "Tidak ada jawaban esai."}</div>
    `;
  }
</script>
</body>
</html>
